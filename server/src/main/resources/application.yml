server:
  port: 8888

spring:
  application:
    name: rocketmq-studio
  profiles:
    active: dev

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState,studioSecurity

studio:
  security:
    user-file: ${STUDIO_SECURITY_USER_FILE:}
    session-ttl: ${STUDIO_SECURITY_SESSION_TTL:24h}
    max-sessions-per-user: ${STUDIO_SECURITY_MAX_SESSIONS_PER_USER:5}
    max-users: ${STUDIO_SECURITY_MAX_USERS:1000}
    registry-check-interval: ${STUDIO_SECURITY_REGISTRY_CHECK_INTERVAL:1s}
    max-concurrent-password-checks: ${STUDIO_SECURITY_MAX_PASSWORD_CHECKS:8}
  metrics:
    prometheus:
      base-url: ${STUDIO_METRICS_PROMETHEUS_BASE_URL:}
      connect-timeout: ${STUDIO_METRICS_PROMETHEUS_CONNECT_TIMEOUT:3s}
      read-timeout: ${STUDIO_METRICS_PROMETHEUS_READ_TIMEOUT:10s}
      username: ${STUDIO_METRICS_PROMETHEUS_USERNAME:}
      password: ${STUDIO_METRICS_PROMETHEUS_PASSWORD:}
      bearer-token: ${STUDIO_METRICS_PROMETHEUS_BEARER_TOKEN:}
