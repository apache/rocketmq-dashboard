name: CI

# 检测前端与后端是否都能正确编译
on:
  push:
    branches:
      - rocketmq-studio
  pull_request:
    branches:
      - rocketmq-studio

jobs:
  backend-build:
    name: Backend Build (Java 21)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Dragonwell)
        uses: actions/setup-java@v4
        with:
          distribution: dragonwell
          java-version: "21"
          cache: maven

      - name: Build backend
        run: mvn -B -ntp clean package -DskipTests

  frontend-build:
    name: Frontend Build (Node 20)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  frontend-docker-build:
    name: Frontend Docker Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build frontend Docker image
        run: docker build -t rocketmq-studio-web-ci ./web

  go-cli:
    name: Go CLI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/rmq
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          cache-dependency-path: tools/rmq/go.sum

      - name: Test
        run: go test -race ./...

      - name: Vet
        run: go vet ./...

      - name: Check generated catalog
        run: go run ./cmd/cataloggen -check

      - name: Build rmqctl
        run: go build ./cmd/rmqctl
