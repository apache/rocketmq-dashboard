name: rocketmq-studio

services:
  rocketmq-server:
    build:
      context: ../server
      dockerfile: Dockerfile
    image: rocketmq-server:latest
    container_name: rocketmq-server
    restart: unless-stopped
    environment:
      STUDIO_SECURITY_USER_FILE: /run/secrets/studio-users.json
    expose:
      - "8888"
    volumes:
      - type: volume
        source: studio-users
        target: /run/secrets
        read_only: true

  rocketmq-web:
    build:
      context: ../web
      dockerfile: Dockerfile
    image: rocketmq-web:latest
    container_name: rocketmq-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:6789:80"
    depends_on:
      - rocketmq-server

volumes:
  studio-users:
