apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rocketmq-dashboard.fullname" . }}-backend
  labels:
    {{- include "rocketmq-dashboard.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      {{- include "rocketmq-dashboard.backendSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "rocketmq-dashboard.backendSelectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: dashboard-backend
          image: {{ include "rocketmq-dashboard.backendImage" . }}
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8082
              protocol: TCP
          env:
            - name: NAMESRV_ADDR
              valueFrom:
                configMapKeyRef:
                  name: {{ include "rocketmq-dashboard.fullname" . }}-config
                  key: NAMESRV_ADDR
            - name: PROXY_ADDR
              valueFrom:
                configMapKeyRef:
                  name: {{ include "rocketmq-dashboard.fullname" . }}-config
                  key: PROXY_ADDR
            - name: JAVA_OPTS
              valueFrom:
                configMapKeyRef:
                  name: {{ include "rocketmq-dashboard.fullname" . }}-config
                  key: JAVA_OPTS
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: {{ .Values.backend.livenessProbe.path }}
              port: 8082
            initialDelaySeconds: {{ .Values.backend.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.backend.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.backend.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.backend.livenessProbe.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ .Values.backend.readinessProbe.path }}
              port: 8082
            initialDelaySeconds: {{ .Values.backend.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.backend.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.backend.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.backend.readinessProbe.failureThreshold }}
      {{- with .Values.backend.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.backend.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.backend.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
