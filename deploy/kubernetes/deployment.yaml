apiVersion: apps/v1
kind: Deployment
metadata:
  name: rocketmq-dashboard-backend
  namespace: rocketmq-dashboard
  labels:
    app.kubernetes.io/name: rocketmq-dashboard
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: rocketmq-dashboard
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rocketmq-dashboard
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: dashboard-backend
          image: apache/rocketmq-dashboard:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8082
              protocol: TCP
          env:
            - name: NAMESRV_ADDR
              valueFrom:
                configMapKeyRef:
                  name: rocketmq-dashboard-config
                  key: NAMESRV_ADDR
            - name: PROXY_ADDR
              valueFrom:
                configMapKeyRef:
                  name: rocketmq-dashboard-config
                  key: PROXY_ADDR
            - name: JAVA_OPTS
              valueFrom:
                configMapKeyRef:
                  name: rocketmq-dashboard-config
                  key: JAVA_OPTS
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /ops/rocketMqStatus.query
              port: 8082
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ops/rocketMqStatus.query
              port: 8082
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
