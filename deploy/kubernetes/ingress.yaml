apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rocketmq-dashboard
  namespace: rocketmq-dashboard
  labels:
    app.kubernetes.io/name: rocketmq-dashboard
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$1
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    # Uncomment the following annotation when using cert-manager for TLS certificates
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - dashboard.rocketmq.local
      # Replace with your TLS secret name
      secretName: rocketmq-dashboard-tls
  rules:
    - host: dashboard.rocketmq.local
      http:
        paths:
          - path: /api/(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: rocketmq-dashboard-backend
                port:
                  number: 8082
          - path: /(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: rocketmq-dashboard-frontend
                port:
                  number: 80
